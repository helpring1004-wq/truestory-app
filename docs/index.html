<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>진실의 책</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main id="app">
      <!-- Cover -->
      <section id="cover-view" class="view cover-view active">
        <div class="book-frame">
          <div class="book-left"></div>
          <div class="book-spine"></div>
          <div class="book-right">
            <div class="emboss">
              <h1 class="book-title">진실의 책</h1>
              <p class="book-subtitle">마음이 머무는 페이지</p>
            </div>
          </div>
        </div>
        <button id="open-btn" class="open-btn" type="button">펼치기</button>
        <p class="hint">아래 버튼을 눌러 페이지를 펼쳐보세요</p>
      </section>

      <!-- Page reveal -->
      <section id="page-view" class="view page-view">
        <div class="page-wrapper">
          <div class="paper left-page">
            <div class="decor-top"></div>
            <div class="decor-line"></div>
            <blockquote id="quote-text"></blockquote>
            <cite id="quote-author"></cite>
            <div class="decor-line bottom"></div>
            <div class="decor-bottom"></div>
          </div>
          <div class="paper right-page">
            <div class="page-number" id="page-num">1</div>
          </div>
        </div>
        <div class="controls">
          <button id="new-page-btn" class="ctrl-btn" type="button">다른 페이지</button>
          <button id="back-btn" class="ctrl-btn secondary" type="button">표지로</button>
        </div>
      </section>
    </main>

    <script src="./quotes.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
